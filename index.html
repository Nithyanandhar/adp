<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmer Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-50 text-gray-800">

    <nav class="bg-green-700 text-white p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold italic">AgroConnect</h1>
            <span id="weather" class="text-sm bg-green-800 px-3 py-1 rounded">Loading Weather...</span>
        </div>
    </nav>

    <main class="container mx-auto p-6 grid md:grid-cols-3 gap-8">
        
        <section class="md:col-span-1 bg-white p-6 rounded-xl shadow-md h-fit">
            <h2 class="text-xl font-semibold mb-4 text-green-700">List Your Produce</h2>
            <form id="cropForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium">Crop Name</label>
                    <input type="text" id="cropName" required class="w-full border p-2 rounded-md focus:ring-2 focus:ring-green-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium">Quantity (kg)</label>
                    <input type="number" id="quantity" required class="w-full border p-2 rounded-md focus:ring-2 focus:ring-green-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium">Price (per kg)</label>
                    <input type="number" id="price" required class="w-full border p-2 rounded-md focus:ring-2 focus:ring-green-500 outline-none">
                </div>
                <button type="submit" class="w-full bg-green-600 text-white py-2 rounded-md hover:bg-green-700 transition">Post Listing</button>
            </form>
        </section>

        <section class="md:col-span-2">
            <h2 class="text-xl font-semibold mb-4 text-gray-700">Available Marketplace</h2>
            <div id="listings" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                </div>
        </section>
    </main>

    <script>
        const cropForm = document.getElementById('cropForm');
        const listingsContainer = document.getElementById('listings');

        // Fetch and display crops
        async function fetchCrops() {
            const res = await fetch('/api/crops');
            const data = await res.json();
            listingsContainer.innerHTML = data.map(crop => `
                <div class="bg-white p-4 rounded-lg shadow border-l-4 border-green-500">
                    <h3 class="font-bold text-lg text-green-800">${crop.cropName}</h3>
                    <p class="text-gray-600">Stock: ${crop.quantity} kg</p>
                    <p class="font-bold text-xl mt-2">₹${crop.price}/kg</p>
                    <button class="mt-3 text-sm text-blue-600 font-semibold">Contact Farmer</button>
                </div>
            `).join('');
        }

        // Submit new crop
        cropForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                cropName: document.getElementById('cropName').value,
                quantity: document.getElementById('quantity').value,
                price: document.getElementById('price').value
            };

            await fetch('/api/add-crop', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            cropForm.reset();
            fetchCrops();
        });

        // Initialize
        fetchCrops();
        document.getElementById('weather').innerText = "28°C - Sunny (Coimbatore)";
    </script>
</body>
</html>
